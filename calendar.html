<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e293b">
<title>יומן משפחתי</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Rubik',sans-serif;background:#f8fafc;min-height:100vh;max-width:520px;margin:0 auto;-webkit-font-smoothing:antialiased;transition:background .3s}
input:focus,textarea:focus,select:focus{outline:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;-webkit-appearance:none}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ── Header ── */
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:22px 18px 14px;color:white}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header-btns{display:flex;gap:5px}
.header-btn{background:rgba(255,255,255,.08);color:white;border-radius:9px;padding:6px 10px;font-size:13px;transition:all .2s}
.header-btn:active{background:rgba(255,255,255,.22)}
.members-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.member-btn{border-radius:20px;padding:5px 14px;font-size:13px;transition:all .2s;border:1.5px solid transparent;font-family:inherit}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:5px;vertical-align:middle}
.sync-dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e88}
.sync-dot.off{background:#ef4444}

/* ── View tabs ── */
.view-tabs{display:flex;gap:4px;padding:12px 16px 0}
.view-tab{flex:1;border-radius:10px;padding:9px 4px;font-size:12px;font-weight:600;text-align:center;background:white;color:#64748b;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .2s;font-family:inherit}
.view-tab.active{background:#6366f1;color:white;box-shadow:0 3px 10px #6366f144}

/* ── Calendar ── */
.cal-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px}
.cal-title{font-size:17px;font-weight:700;color:#1e293b}
.cal-nav-btn{width:34px;height:34px;border-radius:9px;background:white;box-shadow:0 1px 4px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:18px;color:#475569;transition:all .15s}
.cal-nav-btn:active{transform:scale(.88);background:#f1f5f9}
.cal-grid{padding:0 14px}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-day-lbl{text-align:center;font-size:11px;font-weight:700;color:#94a3b8;padding:5px 0}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;cursor:pointer;transition:all .15s;position:relative;min-height:38px}
.cal-cell:active{transform:scale(.88)}
.day-num{font-size:13px;font-weight:500;color:#334155;line-height:1}
.cal-cell.other-month .day-num{color:#c8d3df}
.cal-cell.is-sat .day-num{color:#ef4444}
.cal-cell.is-today{background:#eff6ff}
.cal-cell.is-today .day-num{color:#3b82f6;font-weight:700}
.cal-cell.is-sel{background:#6366f1!important}
.cal-cell.is-sel .day-num{color:white!important;font-weight:700}
.dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;max-width:30px}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── Day panel ── */
.day-panel{margin:10px 14px 0;background:white;border-radius:14px;padding:12px 14px;box-shadow:0 2px 12px rgba(0,0,0,.05);animation:slideUp .2s ease}
.day-panel-hd{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.add-day-btn{font-size:11px;color:#6366f1;font-weight:600;padding:4px 10px;background:#eef2ff;border-radius:8px;font-family:inherit}

/* ── Event card ── */
.ev-card{border-radius:10px;padding:10px 12px;margin-bottom:6px;border-right:4px solid #6366f1;cursor:pointer;transition:all .15s}
.ev-card:active{transform:scale(.98)}
.ev-title{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:2px}
.ev-meta{font-size:11px;color:#64748b;display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.chips{display:flex;gap:3px;flex-wrap:wrap}
.chip{border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600}

/* ── Upcoming / All list ── */
.section{padding:10px 14px 110px}
.grp-lbl{font-size:11px;font-weight:700;color:#94a3b8;padding:8px 0 4px;border-bottom:1px solid #f1f5f9;margin-bottom:5px}
.up-ev{background:white;border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 6px rgba(0,0,0,.05);border-right:4px solid;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;transition:all .15s;animation:slideUp .2s ease}
.up-ev:active{transform:scale(.98)}
.del-btn{opacity:.4;color:#ef4444;font-size:16px;padding:2px 6px;transition:all .15s;border-radius:5px;flex-shrink:0;font-family:inherit}
.del-btn:active{opacity:1;background:#fef2f2}

/* ── Form (bottom sheet) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;animation:fadeIn .2s}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:white;border-radius:20px 20px 0 0;padding:20px 18px 36px;z-index:501;animation:slideUp .28s ease;max-height:92vh;overflow-y:auto}
.handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px}
.form-title{font-size:17px;font-weight:700;color:#1e293b;margin-bottom:16px}
.fg{margin-bottom:13px}
.flbl{font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px;display:block}
.finput{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:#1e293b;transition:border-color .15s;background:white}
.finput:focus{border-color:#6366f1}
.frow{display:flex;gap:8px}
.frow .fg{flex:1}
.fsel{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:#1e293b;background:white;-webkit-appearance:none;appearance:none}
.fsel:focus{border-color:#6366f1}
.mems-grid{display:flex;gap:6px;flex-wrap:wrap}
.mem-check{border-radius:20px;padding:7px 14px;font-size:13px;font-weight:500;border:1.5px solid #e2e8f0;transition:all .15s;background:white;color:#64748b;font-family:inherit}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;transition:all .15s;border:3px solid transparent}
.cswatch.sel{border-color:#1e293b;transform:scale(1.18)}
.check-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:#64748b}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:#6366f1;flex-shrink:0}
.form-btns{display:flex;gap:8px;margin-top:18px}
.btn-cancel{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;background:#f1f5f9;color:#64748b;font-family:inherit}
.btn-save{flex:2;padding:12px;border-radius:12px;font-size:14px;font-weight:700;color:white;background:linear-gradient(135deg,#6366f1,#818cf8);box-shadow:0 3px 10px #6366f144;font-family:inherit}
.btn-save:active{transform:scale(.97)}
.btn-del{width:100%;margin-top:10px;padding:11px;border-radius:11px;font-size:13px;font-weight:500;color:#ef4444;background:#fef2f2;font-family:inherit}

/* ── FAB ── */
.fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:488px;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;border-radius:14px;padding:15px;font-size:15px;font-weight:700;box-shadow:0 6px 24px #6366f166;display:flex;align-items:center;justify-content:center;gap:8px;z-index:100;font-family:inherit}
.fab:active{transform:translateX(-50%) scale(.97)}

/* ── Loading / empty ── */
#loading{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:12px}
#loading .icon{font-size:36px;animation:pulse 1.5s infinite}
#loading .text{font-size:13px;color:#94a3b8}
.empty{text-align:center;padding:42px 20px;color:#cbd5e1}
.empty-ic{font-size:42px;margin-bottom:8px}
.empty-tx{font-size:13px}

/* ── Toast ── */
.toast{position:fixed;top:22px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:9px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:2000;animation:popIn .3s ease;white-space:nowrap}

/* ── Notification banner ── */
.notif-bar{background:#fff7ed;border:1.5px solid #fdba74;border-radius:12px;padding:10px 14px;margin:10px 14px 0;font-size:12px;color:#92400e;display:flex;justify-content:space-between;align-items:center;gap:8px}
.notif-bar button{background:#f59e0b;color:white;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;font-family:inherit}

/* ══ Dark Mode ══ */
body.dark{background:#0f172a;color:#e2e8f0}
.dark .header{background:linear-gradient(135deg,#0f172a,#1e293b)}
.dark .view-tab{background:#1e293b;color:#94a3b8;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.dark .view-tab.active{background:#6366f1;color:white}
.dark .cal-title{color:#e2e8f0}
.dark .cal-nav-btn{background:#1e293b;color:#94a3b8;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.dark .cal-nav-btn:active{background:#334155}
.dark .day-num{color:#cbd5e1}
.dark .cal-cell.other-month .day-num{color:#475569}
.dark .cal-cell.is-today{background:#1e3a8a}
.dark .cal-cell.is-today .day-num{color:#93c5fd}
.dark .cal-cell.is-sat .day-num{color:#f87171}
.dark .day-panel{background:#1e293b;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.dark .day-panel-hd{color:#e2e8f0}
.dark .ev-card{background:#1e293b}
.dark .ev-title{color:#e2e8f0}
.dark .ev-meta{color:#94a3b8}
.dark .up-ev{background:#1e293b}
.dark .grp-lbl{color:#64748b;border-color:#334155}
.dark .sheet{background:#1e293b}
.dark .form-title{color:#e2e8f0}
.dark .flbl{color:#94a3b8}
.dark .finput,.dark .fsel{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark .finput:focus,.dark .fsel:focus{border-color:#6366f1}
.dark .finput::placeholder{color:#64748b}
.dark .mem-check{background:#0f172a;border-color:#334155;color:#94a3b8}
.dark .btn-cancel{background:#334155;color:#94a3b8}
.dark .cswatch.sel{border-color:#e2e8f0}
.dark .handle{background:#334155}
.dark .check-row{color:#94a3b8}
.dark .notif-bar{background:#1c1409;border-color:#92400e;color:#fcd34d}
.dark .empty{color:#475569}
.dark .toast{background:#334155;color:#e2e8f0}
.dark .btn-del{background:#7f1d1d;color:#fca5a5}
.dark .add-day-btn{background:#312e81;color:#a5b4fc}
</style>
</head>

<div id="app">
  <div id="loading"><div class="icon">📅</div><div class="text">מתחבר...</div></div>
</div>

<script>
// ══════════════════════════════════════════
// FIREBASE — same project as shopping app
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AlzaSyDGP5nqOB39ENoeRIMpFo_B3Ya2RBE99sg",
  authDomain: "family-shopping-9f8a6.firebaseapp.com",
  databaseURL: "https://family-shopping-9f8a6-default-rtdb.firebaseio.com",
  projectId: "family-shopping-9f8a6",
  storageBucket: "family-shopping-9f8a6.firebasestorage.app",
  messagingSenderId: "7886163686",
  appId: "1:7886163686:web:544391dd14dac18b2ab527"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const MEMBERS = ["אבא","אמא","גפן","שקד"];
const MC = [
  {bg:"#bfdbfe",border:"#3b82f6",text:"#1d4ed8",darkBg:"#1e3a8a",darkText:"#93c5fd"},
  {bg:"#fbcfe8",border:"#ec4899",text:"#be185d",darkBg:"#831843",darkText:"#f9a8d4"},
  {bg:"#a7f3d0",border:"#10b981",text:"#047857",darkBg:"#064e3b",darkText:"#6ee7b7"},
  {bg:"#fde68a",border:"#f59e0b",text:"#b45309",darkBg:"#78350f",darkText:"#fcd34d"},
];
const COLORS = ["#6366f1","#3b82f6","#22c55e","#f59e0b","#ef4444","#ec4899","#14b8a6","#8b5cf6"];
const DAYS_HE  = ["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
const MONTHS_HE = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

const ADVANCE = [
  {v:0,   l:"בזמן האירוע"},
  {v:5,   l:"5 דקות לפני"},
  {v:10,  l:"10 דקות לפני"},
  {v:30,  l:"30 דקות לפני"},
  {v:60,  l:"שעה לפני"},
  {v:120, l:"שעתיים לפני"},
  {v:1440,l:"יום לפני"},
];
const REPEATS = [
  {v:"none",   l:"ללא חזרה"},
  {v:"daily",  l:"כל יום"},
  {v:"weekly", l:"כל שבוע"},
  {v:"monthly",l:"כל חודש"},
  {v:"custom", l:"כל X ימים"},
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const _today = new Date();
let S = {
  me:           localStorage.getItem("fcal-me") || "",
  connected:    false,
  loaded:       false,
  events:       [],
  view:         "calendar",
  month:        _today.getMonth(),
  year:         _today.getFullYear(),
  selDate:      ds(_today),
  showForm:     false,
  editKey:      null,
  notifAsked:   localStorage.getItem("fcal-notif-asked") === "1",
};

// Form fields (plain object, mutated directly)
let F = blankF();

// Lookup map: key → event (for onclick access without JSON in attributes)
window.__ev = {};

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
const esc = s => s ? String(s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;").replace(/'/g,"&#39;") : "";
const dk  = () => document.body.classList.contains("dark");
const mc  = n  => MC[MEMBERS.indexOf(n)] || MC[0];

function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function pd(s) { // parse YYYY-MM-DD without timezone shift
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(s) {
  const d = pd(s);
  return `${d.getDate()} ב${MONTHS_HE[d.getMonth()]}`;
}
function fmtTime(ev) {
  if (ev.allDay) return "כל היום";
  return ev.time || "";
}
function repeatLabel(ev) {
  switch(ev.repeat) {
    case 'daily':   return 'כל יום';
    case 'weekly':  return 'כל שבוע';
    case 'monthly': return 'כל חודש';
    case 'custom':  return `כל ${ev.customDays||7} ימים`;
    default: return '';
  }
}
function blankF() {
  return {
    title:"", date:ds(_today), time:"09:00", allDay:false,
    repeat:"none", customDays:7,
    members:[...MEMBERS], advanceMins:30,
    color:COLORS[0], note:""
  };
}

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
function startListeners() {
  db.ref("calendar/events").on("value", snap => {
    const d = snap.val() || {};
    S.events = Object.entries(d).map(([k,v]) => ({...v, _k:k}));
    // Rebuild lookup map
    window.__ev = {};
    S.events.forEach(ev => { window.__ev[ev._k] = ev; });
    S.loaded = true;
    render();
    scheduleNotifications();
  });
  db.ref(".info/connected").on("value", snap => {
    S.connected = snap.val() === true;
    render();
  });
}

function saveEvent() {
  if (!F.title.trim()) { toast("⚠️ הכנס כותרת לאירוע"); return; }
  if (!F.members.length) { toast("⚠️ בחר לפחות בן משפחה אחד"); return; }

  const ev = {
    title:      F.title.trim(),
    date:       F.date,
    time:       F.allDay ? null : F.time,
    allDay:     F.allDay,
    repeat:     F.repeat,
    customDays: F.repeat === 'custom' ? (parseInt(F.customDays)||7) : null,
    members:    F.members,
    advanceMins:F.allDay ? 0 : F.advanceMins,
    color:      F.color,
    note:       F.note.trim(),
    addedBy:    S.me,
    addedAt:    Date.now(),
  };

  if (S.editKey) {
    db.ref(`calendar/events/${S.editKey}`).update(ev);
    toast("✅ האירוע עודכן");
  } else {
    db.ref("calendar/events").push(ev);
    toast("✅ האירוע נוסף");
  }

  S.showForm = false;
  S.editKey  = null;
  F = blankF();
  render();
}

function deleteEvent(key) {
  db.ref(`calendar/events/${key}`).remove();
  S.showForm = false;
  S.editKey  = null;
  toast("🗑 נמחק");
  render();
}

// ══════════════════════════════════════════
// REPEAT EXPANSION
// ══════════════════════════════════════════
// Returns occurrences of ev between from..to (Date or YYYY-MM-DD)
function getOccurrences(ev, from, to) {
  const base   = pd(ev.date);
  const fromD  = (from instanceof Date) ? from : pd(from);
  const toD    = (to   instanceof Date) ? to   : pd(to);
  const results = [];

  if (!ev.repeat || ev.repeat === 'none') {
    if (base >= fromD && base <= toD) results.push({...ev, occDate: ev.date});
    return results;
  }

  // Advance to first occurrence >= fromD
  let cur = new Date(base);
  if (cur < fromD) {
    const diffDays = Math.ceil((fromD - cur) / 86400000);
    if (ev.repeat === 'daily') {
      cur = new Date(cur.getTime() + diffDays * 86400000);
    } else if (ev.repeat === 'weekly') {
      cur = new Date(cur.getTime() + Math.ceil(diffDays/7)*7*86400000);
    } else if (ev.repeat === 'monthly') {
      while (cur < fromD) cur.setMonth(cur.getMonth()+1);
    } else if (ev.repeat === 'custom') {
      const n = ev.customDays || 7;
      cur = new Date(cur.getTime() + Math.ceil(diffDays/n)*n*86400000);
    }
  }

  let guard = 0;
  while (cur <= toD && guard++ < 400) {
    results.push({...ev, occDate: ds(cur)});
    if      (ev.repeat === 'daily')   cur = new Date(cur.getTime() + 86400000);
    else if (ev.repeat === 'weekly')  cur = new Date(cur.getTime() + 7*86400000);
    else if (ev.repeat === 'monthly') { cur = new Date(cur); cur.setMonth(cur.getMonth()+1); }
    else if (ev.repeat === 'custom')  cur = new Date(cur.getTime() + (ev.customDays||7)*86400000);
    else break;
  }
  return results;
}

function eventsForDate(dateString) {
  const res = [];
  for (const ev of S.events) {
    if (getOccurrences(ev, dateString, dateString).length) res.push(ev);
  }
  return res.sort((a,b) => {
    if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
    return (a.time||'').localeCompare(b.time||'');
  });
}

function upcomingOccs(days=60) {
  const from = new Date(_today); from.setHours(0,0,0,0);
  const to   = new Date(from.getTime() + days*86400000);
  const res  = [];
  for (const ev of S.events) res.push(...getOccurrences(ev, from, to));
  res.sort((a,b) => {
    if (a.occDate !== b.occDate) return a.occDate.localeCompare(b.occDate);
    if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
    return (a.time||'').localeCompare(b.time||'');
  });
  return res;
}

// ══════════════════════════════════════════
// SERVICE WORKER & NOTIFICATIONS
// ══════════════════════════════════════════
let swReg = null;
const mainTimers = new Map(); // fallback timers in main thread

async function initSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    await navigator.serviceWorker.register('./calendar-sw.js');
    // Wait until SW is fully active before using it
    swReg = await navigator.serviceWorker.ready;
  } catch(e) { /* file:// or SW not supported */ }
}

async function askNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied')  return false;
  const p = await Notification.requestPermission();
  localStorage.setItem("fcal-notif-asked","1");
  S.notifAsked = true;
  render();
  return p === 'granted';
}

function buildAlarms() {
  const now  = Date.now();
  const from = new Date(); from.setHours(0,0,0,0);
  const to   = new Date(now + 48*60*60*1000);
  const alarms = [];

  for (const ev of S.events) {
    if (ev.allDay || !ev.time) continue;
    // Only notify on this device if the logged-in member is in the event
    if (S.me && ev.members && !ev.members.includes(S.me)) continue;
    const occs = getOccurrences(ev, from, to);
    for (const occ of occs) {
      const [h,m] = (occ.time||'00:00').split(':').map(Number);
      const evDate = pd(occ.occDate);
      evDate.setHours(h, m, 0, 0);
      const fireAt = evDate.getTime() - (occ.advanceMins||0)*60000;
      if (fireAt <= now) continue;

      const memberStr = (occ.members||[]).join(', ');
      const advTxt = occ.advanceMins > 0
        ? ` — בעוד ${occ.advanceMins >= 60 ? (occ.advanceMins/60)+'שע׳' : occ.advanceMins+'ד׳'}`
        : '';
      alarms.push({
        id:    `${occ._k}-${occ.occDate}`,
        fireAt,
        title: occ.title,
        body:  `${occ.time}${advTxt} | ${memberStr}`,
      });
    }
  }
  return alarms;
}

function scheduleNotifications() {
  if (Notification.permission !== 'granted') return;
  const alarms = buildAlarms();

  // ① Send to Service Worker (works when app is in background)
  if (swReg && swReg.active) {
    swReg.active.postMessage({ type:'SCHEDULE', alarms });
  }

  // ② Fallback: main-thread timers (works when app is open/minimized)
  for (const t of mainTimers.values()) clearTimeout(t);
  mainTimers.clear();
  const now = Date.now();
  for (const alarm of alarms) {
    const delay = alarm.fireAt - now;
    if (delay <= 0 || delay > 48*60*60*1000) continue;
    const t = setTimeout(() => {
      mainTimers.delete(alarm.id);
      // Show via SW if available, else browser Notification
      if (swReg && swReg.active) {
        swReg.showNotification(alarm.title, {
          body: alarm.body,
          icon: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📅</text></svg>'),
          tag: 'cal-' + alarm.id,
          requireInteraction: true,
        });
      } else if ('Notification' in window) {
        new Notification(alarm.title, { body: alarm.body, tag: 'cal-' + alarm.id });
      }
    }, delay);
    mainTimers.set(alarm.id, t);
  }
}

function pickMe(name) {
  S.me = name; localStorage.setItem("fcal-me", name); render();
}
function prevMonth() {
  if (S.month===0){S.month=11;S.year--;} else S.month--;
  render();
}
function nextMonth() {
  if (S.month===11){S.month=0;S.year++;} else S.month++;
  render();
}
function goToday() {
  S.month = _today.getMonth(); S.year = _today.getFullYear();
  S.selDate = ds(_today); render();
}
function selDate(d) { S.selDate = d; render(); }
function switchView(v) { S.view = v; render(); }

function openForm(date) {
  S.editKey = null;
  F = blankF();
  if (date) F.date = date;
  S.showForm = true;
  render();
  setTimeout(() => document.getElementById('ft')?.focus(), 80);
}
function openEdit(key) {
  const ev = window.__ev[key];
  if (!ev) return;
  S.editKey  = key;
  F = {
    title:      ev.title  || "",
    date:       ev.date   || ds(_today),
    time:       ev.time   || "09:00",
    allDay:     ev.allDay || false,
    repeat:     ev.repeat || "none",
    customDays: ev.customDays || 7,
    members:    ev.members ? [...ev.members] : [...MEMBERS],
    advanceMins:ev.advanceMins ?? 30,
    color:      ev.color  || COLORS[0],
    note:       ev.note   || "",
  };
  S.showForm = true;
  render();
}
function closeForm() {
  S.showForm = false; S.editKey = null; render();
}
function toggleMem(name) {
  if (F.members.includes(name)) {
    if (F.members.length > 1) F.members = F.members.filter(m=>m!==name);
  } else {
    F.members = [...F.members, name];
  }
  render();
}
function setColor(c) { F.color = c; render(); }
function setRepeat(v) { F.repeat = v; render(); }
function toggleAllDay() { F.allDay = !F.allDay; render(); }

function toggleDark() {
  document.body.classList.toggle("dark");
  const d = dk();
  localStorage.setItem("fcal-dark", d?"1":"0");
  document.querySelector('meta[name="theme-color"]').content = d?"#0f172a":"#1e293b";
  render();
}
function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  if (dk()) { t.style.background="#334155"; t.style.color="#e2e8f0"; }
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

// ── Calendar view ──
function renderCalendar(isDk) {
  const firstDay    = new Date(S.year, S.month, 1);
  const daysInMonth = new Date(S.year, S.month+1, 0).getDate();
  const prevMonDays = new Date(S.year, S.month,   0).getDate();
  const startDow    = firstDay.getDay(); // 0=Sun

  // Build event map for visible range
  const gridStart = new Date(S.year, S.month, 1 - startDow);
  const total     = startDow + daysInMonth;
  const trailing  = total%7===0 ? 0 : 7-(total%7);
  const gridEnd   = new Date(S.year, S.month, daysInMonth + trailing);
  const evMap = {};
  for (const ev of S.events) {
    for (const occ of getOccurrences(ev, gridStart, gridEnd)) {
      (evMap[occ.occDate] = evMap[occ.occDate]||[]).push(occ);
    }
  }

  const todayStr = ds(_today);
  let h = `<div class="cal-nav">
    <button class="cal-nav-btn" onclick="nextMonth()">&#8250;</button>
    <div class="cal-title">${MONTHS_HE[S.month]} ${S.year}</div>
    <button class="cal-nav-btn" onclick="prevMonth()">&#8249;</button>
  </div>
  <div class="cal-grid">
    <div class="cal-days-header">
      ${DAYS_HE.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('')}
    </div>
    <div class="cal-cells">`;

  function cell(dayNum, dStr, isCur) {
    const evs    = evMap[dStr] || [];
    const isTod  = dStr === todayStr;
    const isSel  = dStr === S.selDate;
    const isSat  = pd(dStr).getDay() === 6;
    let cls = "cal-cell";
    if (!isCur) cls += " other-month";
    if (isTod)  cls += " is-today";
    if (isSel)  cls += " is-sel";
    if (isSat && !isSel) cls += " is-sat";

    const dots = evs.slice(0,3).map(ev =>
      `<div class="dot" style="background:${isSel?'rgba(255,255,255,.8)':ev.color||'#6366f1'};"></div>`
    ).join('');

    return `<div class="${cls}" onclick="selDate('${dStr}')">
      <div class="day-num">${dayNum}</div>
      ${dots?`<div class="dots">${dots}</div>`:''}
    </div>`;
  }

  // Prev month fill
  for (let i=0; i<startDow; i++) {
    const d = prevMonDays - startDow + 1 + i;
    const dStr = ds(new Date(S.year, S.month-1, d));
    h += cell(d, dStr, false);
  }
  // Current month
  for (let d=1; d<=daysInMonth; d++) {
    h += cell(d, ds(new Date(S.year, S.month, d)), true);
  }
  // Next month fill
  for (let d=1; d<=trailing; d++) {
    h += cell(d, ds(new Date(S.year, S.month+1, d)), false);
  }

  h += `</div></div>`;

  // ── Day panel ──
  const dayEvs  = eventsForDate(S.selDate);
  const selD    = pd(S.selDate);
  const isToday = S.selDate === ds(_today);
  const dayLbl  = isToday ? "היום" : `${selD.getDate()} ב${MONTHS_HE[selD.getMonth()]}`;

  h += `<div class="day-panel">
    <div class="day-panel-hd">
      <span>📆 ${dayLbl}</span>
      <button class="add-day-btn" onclick="openForm('${S.selDate}')">+ הוסף</button>
    </div>`;

  if (!dayEvs.length) {
    h += `<div style="text-align:center;padding:14px;color:#94a3b8;font-size:13px;">אין אירועים ביום זה</div>`;
  } else {
    h += dayEvs.map(ev => evCard(ev, isDk)).join('');
  }
  h += `</div>`;
  return h;
}

// ── Upcoming view ──
function renderUpcoming(isDk) {

  if (!occs.length) return `<div class="section"><div class="empty"><div class="empty-ic">⏰</div><div class="empty-tx">אין אירועים קרובים</div></div></div>`;

  const groups = {};
  for (const occ of occs) (groups[occ.occDate]=groups[occ.occDate]||[]).push(occ);

  const todStr  = ds(_today);
  const tomStr  = ds(new Date(_today.getTime()+86400000));
  let h = `<div class="section">`;

  for (const [dStr, evs] of Object.entries(groups).sort()) {
    const label = dStr===todStr ? `📍 היום — ${fmtDate(dStr)}`
                : dStr===tomStr ? `🔜 מחר — ${fmtDate(dStr)}`

    h += `<div><div class="grp-lbl">${label}</div>`;
    for (const ev of evs) {
      const bg      = isDk ? '#1e293b' : (ev.color||'#6366f1')+'15';
      const chips   = (ev.members||[]).map(m => memberChip(m, isDk)).join('');
      const repLbl  = repeatLabel(ev);
      const advLbl  = (!ev.allDay && ev.advanceMins > 0)

      h += `<div class="up-ev" style="background:${bg};border-right-color:${ev.color||'#6366f1'};" onclick="openEdit('${ev._k}')">
        <div style="flex:1;min-width:0;">

          <div style="font-size:11px;color:#64748b;display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:4px;">
            <span>${fmtTime(ev)}</span>

    }
    h += `</div>`;
  }
  h += `</div>`;
  return h;

      <textarea class="finput" rows="2" oninput="F.note=this.value"
        placeholder="פרטים נוספים..." style="resize:none;background:${iBg};border-color:${iBd};color:${iC};">${esc(F.note)}</textarea>
    </div>

    <div class="form-btns">
      <button class="btn-cancel" onclick="closeForm()">ביטול</button>
      <button class="btn-save" onclick="saveEvent()">${S.editKey?'💾 שמור שינויים':'✅ הוסף אירוע'}</button>
    </div>

    ${S.editKey?`<button class="btn-del" onclick="if(confirm('למחוק את האירוע?'))deleteEvent('${S.editKey}')">🗑 מחק אירוע</button>`:''}
  </div>`;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
// Restore dark mode
if (localStorage.getItem("fcal-dark")==="1") {
  document.body.classList.add("dark");
  document.querySelector('meta[name="theme-color"]').content="#0f172a";
}

// Init SW immediately, then schedule once ready
initSW().then(() => scheduleNotifications());

// Ask permission on first tap
document.addEventListener('click', async function once() {
  document.removeEventListener('click', once);
  const granted = await askNotifPermission();
  if (granted) scheduleNotifications();
}, {once:true});

// Re-schedule every time the user returns to the app
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') scheduleNotifications();
});

startListeners();
render();
</script>
</body>
</html>
