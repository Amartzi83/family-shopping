<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e293b">
<title>יומן משפחתי</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Rubik',sans-serif;background:#eef2f7;min-height:100vh;max-width:520px;margin:0 auto;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0px)}
input:focus,textarea:focus,select:focus{outline:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;-webkit-appearance:none}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ── Header ── */
.header{background:white;padding:14px 18px 12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.header-title{font-size:18px;font-weight:700;color:#1e293b;text-align:center;flex:1}
.header-icon-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:#f1f5f9;flex-shrink:0}
.header-icon-btn:active{background:#e2e8f0}
.members-row{display:flex;gap:16px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none}
.members-row::-webkit-scrollbar{display:none}
.member-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer}
.member-avatar{width:58px;height:58px;border-radius:50%;border:3px solid transparent;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;position:relative;transition:all .2s;overflow:hidden}
.member-avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%}
.member-me-badge{position:absolute;top:-2px;right:-2px;background:#2563eb;color:white;font-size:9px;font-weight:700;padding:2px 5px;border-radius:6px;line-height:1.2}
.member-name{font-size:11px;font-weight:500;color:#64748b;text-align:center}
.member-name.is-me{color:#2563eb;font-weight:700}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.sync-dot.on{background:#22c55e}
.sync-dot.off{background:#ef4444}

/* ── FAB ── */
.fab-add{position:fixed;bottom:26px;left:24px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#818cf8);color:white;font-size:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px #6366f166;border:none;cursor:pointer;font-family:inherit;transition:transform .15s;z-index:100}
.fab-add:active{transform:scale(.9)}
.fab-search{position:fixed;bottom:26px;right:24px;width:60px;height:60px;border-radius:50%;background:white;color:#6366f1;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.12);border:none;cursor:pointer;font-family:inherit;transition:transform .15s;z-index:100}
.fab-search:active{transform:scale(.9)}
/* ── View pills ── */
.view-pills{display:flex;gap:6px;padding:10px 14px 2px;overflow-x:auto;scrollbar-width:none}
.view-pills::-webkit-scrollbar{display:none}
.view-pill{border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;border:none;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.view-pill.active{background:#6366f1;color:white}
.view-pill:not(.active){background:white;color:#64748b;box-shadow:0 1px 4px rgba(0,0,0,.07)}
/* ── Search bar ── */
.search-bar{margin:8px 14px 0;position:relative}
.search-input{width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 14px 10px 38px;font-size:14px;font-family:inherit;color:#1e293b;background:white;transition:border-color .15s}
.search-input:focus{border-color:#6366f1}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}

/* ── Calendar ── */
.cal-wrap{background:white;margin:10px 12px 0;border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;padding-bottom:8px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px}
.cal-title{font-size:17px;font-weight:700;color:#1e293b}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:18px;color:#475569;transition:all .15s;border:none;cursor:pointer}
.cal-nav-btn:active{transform:scale(.88);background:#e2e8f0}
.cal-grid{padding:0 10px}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.cal-day-lbl{text-align:center;font-size:11px;font-weight:700;color:#94a3b8;padding:5px 0}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{display:flex;flex-direction:column;align-items:center;border-radius:10px;cursor:pointer;transition:all .15s;position:relative;min-height:44px;padding:5px 2px 3px}
.cal-cell:active{transform:scale(.88)}
.day-num{font-size:13px;font-weight:500;color:#334155;line-height:1;margin-bottom:2px}
.cal-cell.other-month .day-num{color:#c8d3df}
.cal-cell.is-sat .day-num{color:#ef4444}
.cal-cell.is-today .day-num{background:#6366f1;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-cell.is-sel .day-num{background:#1e293b;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-cell.is-today.is-sel .day-num{background:#1e293b}
.cal-bars{display:flex;flex-direction:column;gap:1px;width:100%;padding:0 1px}
.cal-bar{height:4px;border-radius:2px;width:100%}
.cal-bar-more{font-size:8px;color:#94a3b8;text-align:center;line-height:1.2}

/* ── Day panel ── */
.cal-view-wrap{padding-bottom:100px}
.day-panel{margin:10px 12px 0;background:white;border-radius:16px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.05);animation:slideUp .2s ease}
.day-panel-hd{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.add-day-btn{font-size:11px;color:#6366f1;font-weight:600;padding:5px 12px;background:#eef2ff;border-radius:20px;font-family:inherit;border:none;cursor:pointer}

/* ── Event card ── */
.ev-card{border-radius:12px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;background:white;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.ev-card:active{transform:scale(.98)}
.ev-color-bar{width:4px;border-radius:3px;align-self:stretch;flex-shrink:0;min-height:36px}
.ev-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:2px}
.ev-meta{font-size:11px;color:#64748b;display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.chips{display:flex;gap:3px;flex-wrap:wrap}
.chip{border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600}

/* ── Upcoming / All list ── */
.section{padding:10px 12px 100px}
.grp-lbl{font-size:11px;font-weight:700;color:#94a3b8;padding:10px 2px 5px;letter-spacing:.5px;text-transform:uppercase}
.up-ev{background:white;border-radius:12px;padding:11px 12px;margin-bottom:7px;box-shadow:0 1px 6px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all .15s;animation:slideUp .2s ease}
.up-ev:active{transform:scale(.98)}
.del-btn{opacity:.35;color:#ef4444;font-size:15px;padding:2px 6px;transition:all .15s;border-radius:8px;flex-shrink:0;font-family:inherit;border:none;background:none;cursor:pointer}
.del-btn:active{opacity:1;background:#fef2f2}

/* ── Form (bottom sheet) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;animation:fadeIn .2s}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:white;border-radius:20px 20px 0 0;padding:20px 18px 36px;z-index:501;animation:slideUp .28s ease;max-height:92vh;overflow-y:auto}
.handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px}
.form-title{font-size:17px;font-weight:700;color:#1e293b;margin-bottom:16px}
.fg{margin-bottom:13px}
.flbl{font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px;display:block}
.finput{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;color:#1e293b;transition:border-color .15s;background:white}
.finput:focus{border-color:#6366f1}
.frow{display:flex;gap:8px}
.frow .fg{flex:1}
.fsel{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:#1e293b;background:white;-webkit-appearance:none;appearance:none}
.fsel:focus{border-color:#6366f1}
.mems-grid{display:flex;gap:6px;flex-wrap:wrap}
.mem-check{border-radius:20px;padding:7px 14px;font-size:13px;font-weight:500;border:1.5px solid #e2e8f0;transition:all .15s;background:white;color:#64748b;font-family:inherit}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.cswatch{width:30px;height:30px;border-radius:50%;cursor:pointer;transition:all .15s;border:3px solid transparent}
.cswatch.sel{border-color:#1e293b;transform:scale(1.18)}
.check-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:#64748b}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:#6366f1;flex-shrink:0}
.form-btns{display:flex;gap:8px;margin-top:18px}
.btn-cancel{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;background:#f1f5f9;color:#64748b;font-family:inherit}
.btn-save{flex:2;padding:12px;border-radius:12px;font-size:14px;font-weight:700;color:white;background:linear-gradient(135deg,#6366f1,#818cf8);box-shadow:0 3px 10px #6366f144;font-family:inherit}
.btn-save:active{transform:scale(.97)}
.btn-del{width:100%;margin-top:10px;padding:11px;border-radius:11px;font-size:13px;font-weight:500;color:#ef4444;background:#fef2f2;font-family:inherit}

/* ── FAB (kept as fallback, main FAB is in bottom-nav) ── */
.fab{display:none}

/* ── Loading / empty ── */
#loading{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:12px}
#loading .icon{font-size:36px;animation:pulse 1.5s infinite}
#loading .text{font-size:13px;color:#94a3b8}
.empty{text-align:center;padding:42px 20px;color:#cbd5e1}
.empty-ic{font-size:42px;margin-bottom:8px}
.empty-tx{font-size:13px}

/* ── Toast ── */
.toast{position:fixed;top:22px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:9px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:2000;animation:popIn .3s ease;white-space:nowrap}

/* ── Notification banner ── */
.notif-bar{background:#fff7ed;border:1.5px solid #fdba74;border-radius:12px;padding:10px 14px;margin:10px 14px 0;font-size:12px;color:#92400e;display:flex;justify-content:space-between;align-items:center;gap:8px}
.notif-bar button{background:#f59e0b;color:white;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;font-family:inherit}

/* ══ Dark Mode ══ */
body.dark{background:#0f172a;color:#e2e8f0}
.dark .header{background:#1a2236;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.dark .header-title{color:#e2e8f0}
.dark .header-icon-btn{background:#263349;color:#94a3b8}
.dark .header-icon-btn:active{background:#334155}
.dark .member-name{color:#64748b}
.dark .member-name.is-me{color:#818cf8}
.dark .fab-search{background:#1a2236;color:#818cf8;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.dark .view-pill:not(.active){background:#1a2236;color:#94a3b8}
.dark .search-input{background:#1a2236;border-color:#334155;color:#e2e8f0}
.dark .cal-wrap{background:#1a2236;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.dark .cal-title{color:#e2e8f0}
.dark .cal-nav-btn{background:#263349;color:#94a3b8}
.dark .cal-nav-btn:active{background:#334155}
.dark .day-num{color:#cbd5e1}
.dark .cal-cell.other-month .day-num{color:#334155}
.dark .cal-cell.is-today .day-num{background:#4f46e5;color:white}
.dark .cal-cell.is-sel .day-num{background:#94a3b8;color:#0f172a}
.dark .cal-cell.is-sat .day-num{color:#f87171}
.dark .day-panel{background:#1a2236;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.dark .day-panel-hd{color:#e2e8f0}
.dark .add-day-btn{background:#312e81;color:#a5b4fc}
.dark .ev-card{background:#263349;box-shadow:none}
.dark .ev-title{color:#e2e8f0}
.dark .ev-meta{color:#94a3b8}
.dark .up-ev{background:#263349;box-shadow:none}
.dark .grp-lbl{color:#475569}
.dark .sheet{background:#1a2236}
.dark .form-title{color:#e2e8f0}
.dark .flbl{color:#94a3b8}
.dark .finput,.dark .fsel{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark .finput:focus,.dark .fsel:focus{border-color:#6366f1}
.dark .finput::placeholder{color:#64748b}
.dark .mem-check{background:#0f172a;border-color:#334155;color:#94a3b8}
.dark .btn-cancel{background:#334155;color:#94a3b8}
.dark .cswatch.sel{border-color:#e2e8f0}
.dark .handle{background:#334155}
.dark .check-row{color:#94a3b8}
.dark .notif-bar{background:#1c1409;border-color:#92400e;color:#fcd34d}
.dark .empty{color:#475569}
.dark .toast{background:#334155;color:#e2e8f0}
.dark .btn-del{background:#7f1d1d;color:#fca5a5}
</style>
</head>
<body>

<div id="app">
  <div id="loading"><div class="icon">📅</div><div class="text">מתחבר...</div></div>
</div>

<script>
// ══════════════════════════════════════════
// FIREBASE — same project as shopping app
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDGP5nqOB39ENoeRIMpFo_B3Ya2RBE99sg",
  authDomain: "family-shopping-9f8a6.firebaseapp.com",
  databaseURL: "https://family-shopping-9f8a6-default-rtdb.firebaseio.com",
  projectId: "family-shopping-9f8a6",
  storageBucket: "family-shopping-9f8a6.firebasestorage.app",
  messagingSenderId: "7886163686",
  appId: "1:7886163686:web:544391dd14dac18b2ab527"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const MEMBERS = ["אבא","אמא","גפן","שקד"];
const MC = [
  {bg:"#bfdbfe",border:"#3b82f6",text:"#1d4ed8",darkBg:"#1e3a8a",darkText:"#93c5fd"},
  {bg:"#fbcfe8",border:"#ec4899",text:"#be185d",darkBg:"#831843",darkText:"#f9a8d4"},
  {bg:"#a7f3d0",border:"#10b981",text:"#047857",darkBg:"#064e3b",darkText:"#6ee7b7"},
  {bg:"#fde68a",border:"#f59e0b",text:"#b45309",darkBg:"#78350f",darkText:"#fcd34d"},
];
const COLORS = ["#6366f1","#3b82f6","#22c55e","#f59e0b","#ef4444","#ec4899","#14b8a6","#8b5cf6"];
const MEMBER_PHOTOS = {
  "אבא": "img/abba.png",
  "אמא": "img/mama.jpg",
  "גפן": "img/gafen.jpg",
  "שקד": "img/shaked.jpg",
};
const DAYS_HE  = ["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
const MONTHS_HE = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

const ADVANCE = [
  {v:0,   l:"בזמן האירוע"},
  {v:5,   l:"5 דקות לפני"},
  {v:10,  l:"10 דקות לפני"},
  {v:30,  l:"30 דקות לפני"},
  {v:60,  l:"שעה לפני"},
  {v:120, l:"שעתיים לפני"},
  {v:1440,l:"יום לפני"},
];
const REPEATS = [
  {v:"none",   l:"ללא חזרה"},
  {v:"range",  l:"📆 תקופה (מתאריך עד תאריך)"},
  {v:"daily",  l:"כל יום"},
  {v:"weekly", l:"כל שבוע"},
  {v:"monthly",l:"כל חודש"},
  {v:"custom", l:"כל X ימים"},
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const _today = new Date();
let S = {
  me:           localStorage.getItem("fcal-me") || "",
  connected:    false,
  loaded:       false,
  events:       [],
  view:         "calendar",
  month:        _today.getMonth(),
  year:         _today.getFullYear(),
  selDate:      ds(_today),
  showForm:     false,
  editKey:      null,
  notifAsked:   localStorage.getItem("fcal-notif-asked") === "1",
  showSearch:   false,
  searchQ:      "",
};

// Form fields (plain object, mutated directly)
let F = blankF();

// Lookup map: key → event (for onclick access without JSON in attributes)
window.__ev = {};

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
const esc = s => s ? String(s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;").replace(/'/g,"&#39;") : "";
const dk  = () => document.body.classList.contains("dark");
const mc  = n  => MC[MEMBERS.indexOf(n)] || MC[0];

function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function pd(s) { // parse YYYY-MM-DD without timezone shift
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(s) {
  const d = pd(s);
  return `${d.getDate()} ב${MONTHS_HE[d.getMonth()]}`;
}
function fmtTime(ev) {
  if (ev.allDay) return "כל היום";
  return ev.time || "";
}
function repeatLabel(ev) {
  let base = '';
  switch(ev.repeat) {
    case 'range':   return `📆 ${fmtDate(ev.date)} עד ${ev.endDate ? fmtDate(ev.endDate) : '?'}`;
    case 'daily':   base = 'כל יום'; break;
    case 'weekly':  base = 'כל שבוע'; break;
    case 'monthly': base = 'כל חודש'; break;
    case 'custom':  base = `כל ${ev.customDays||7} ימים`; break;
    default: return '';
  }
  if (ev.endDate) base += ` עד ${fmtDate(ev.endDate)}`;
  return base;
}
function blankF() {
  return {
    eventType:"reminder",
    title:"", date:ds(_today), endDate:"", time:"09:00", allDay:false,
    repeat:"none", customDays:7,
    members:[...MEMBERS], advanceMins:[30],
    color:COLORS[0], note:""
  };
}

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
function startListeners() {
  db.ref("calendar/events").on("value", snap => {
    const d = snap.val() || {};
    S.events = Object.entries(d).map(([k,v]) => ({...v, _k:k}));
    // Rebuild lookup map
    window.__ev = {};
    S.events.forEach(ev => { window.__ev[ev._k] = ev; });
    S.loaded = true;
    render();
  });
  db.ref(".info/connected").on("value", snap => {

// ══════════════════════════════════════════
// REPEAT EXPANSION
// ══════════════════════════════════════════
// Returns occurrences of ev between from..to (Date or YYYY-MM-DD)
function getOccurrences(ev, from, to) {
  const base   = pd(ev.date);
  const fromD  = (from instanceof Date) ? from : pd(from);
  let   toD    = (to   instanceof Date) ? to   : pd(to);
  const results = [];

  if (!ev.repeat || ev.repeat === 'none') {
    if (base >= fromD && base <= toD) results.push({...ev, occDate: ev.date});
    return results;
  }

  // 'range' = daily from date to endDate
  if (ev.repeat === 'range') {
    if (!ev.endDate) return results;
    const rangeEnd = pd(ev.endDate);
    const capTo = rangeEnd < toD ? rangeEnd : toD;
    let cur = base < fromD ? new Date(fromD) : new Date(base);
    let guard = 0;
    while (cur <= capTo && guard++ < 400) {
      results.push({...ev, occDate: ds(cur)});
      cur = new Date(cur.getTime() + 86400000);
    }
    return results;
  }

  // Advance to first occurrence >= fromD
  let cur = new Date(base);
  if (cur < fromD) {
    const diffDays = Math.ceil((fromD - cur) / 86400000);
    if (ev.repeat === 'daily') {
      cur = new Date(cur.getTime() + diffDays * 86400000);
    } else if (ev.repeat === 'weekly') {
      cur = new Date(cur.getTime() + Math.ceil(diffDays/7)*7*86400000);
    } else if (ev.repeat === 'monthly') {
      while (cur < fromD) cur.setMonth(cur.getMonth()+1);
    } else if (ev.repeat === 'custom') {
      const n = ev.customDays || 7;
      cur = new Date(cur.getTime() + Math.ceil(diffDays/n)*n*86400000);
    }
  }

  // Cap at event's own endDate if set
  const evEnd = ev.endDate ? pd(ev.endDate) : null;
  if (evEnd && evEnd < toD) toD = evEnd;

  let guard = 0;
  while (cur <= toD && guard++ < 400) {
    results.push({...ev, occDate: ds(cur)});
    if      (ev.repeat === 'daily')   cur = new Date(cur.getTime() + 86400000);
    else if (ev.repeat === 'weekly')  cur = new Date(cur.getTime() + 7*86400000);
    else if (ev.repeat === 'monthly') { cur = new Date(cur); cur.setMonth(cur.getMonth()+1); }
    else if (ev.repeat === 'custom')  cur = new Date(cur.getTime() + (ev.customDays||7)*86400000);
    else break;
  }
  return results;
}

function eventsForDate(dateString) {
  const res = [];
  for (const ev of S.events) {
    if (getOccurrences(ev, dateString, dateString).length) res.push(ev);
  }
  return res.sort((a,b) => {
    if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
    return (a.time||'').localeCompare(b.time||'');
  });
}

function upcomingOccs(days=60) {
  const from = new Date(_today); from.setHours(0,0,0,0);
  const to   = new Date(from.getTime() + days*86400000);
  const res  = [];
  for (const ev of S.events) res.push(...getOccurrences(ev, from, to));
  res.sort((a,b) => {
    if (a.occDate !== b.occDate) return a.occDate.localeCompare(b.occDate);
    if (a.allDay !== b.allDay) return a.allDay ? -1 : 1;
    return (a.time||'').localeCompare(b.time||'');
  });
  return res;
}

const VAPID_KEY = 'BEbGS1bCZaZrXxWN5wp38Eg0PHMFm3S8hgXQL4wdAy9u7esFgev_ww7vSABl3yhI4fQF7IS1xiBogekTs8cdjAM';
let fcmMessaging = null;
let fcmReady = null; // Promise — resolves when FCM is initialized

async function initFCM() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  try {
    await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    fcmMessaging = firebase.messaging();
    fcmMessaging.onMessage(payload => {
      const n = (payload.webpush && payload.webpush.notification) || payload.notification || {};
      toast(`🔔 ${n.title || 'תזכורת'}`);
    });
  } catch(e) {
    console.log('FCM init error:', e);
  }
}

async function askNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied')  return false;
  const p = await Notification.requestPermission();
  localStorage.setItem("fcal-notif-asked", "1");
  S.notifAsked = true;
  render();
  return p === 'granted';
}

async function registerFCMToken(memberName) {
  await fcmReady;
  if (!fcmMessaging || !memberName) return;
  if (Notification.permission !== 'granted') return;
  try {
    const swReg = await navigator.serviceWorker.getRegistration('./firebase-messaging-sw.js');
    if (!swReg) return;
    const token = await fcmMessaging.getToken({
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: swReg,
    });
    if (!token) return;

    let deviceId = localStorage.getItem('fcal-device-id');
    if (!deviceId) {
      deviceId = Date.now().toString(36) + Math.random().toString(36).slice(2);
      localStorage.setItem('fcal-device-id', deviceId);
    }

    const prevMember = localStorage.getItem('fcal-token-member');
    if (prevMember && prevMember !== memberName) {
      await db.ref(`fcm_tokens/${prevMember}/${deviceId}`).remove();
    }

    await db.ref(`fcm_tokens/${memberName}/${deviceId}`).set(token);
    localStorage.setItem('fcal-token-member', memberName);
  } catch(e) {
    console.log('FCM token error:', e);
  }
}

async function testNotif() {
  if (Notification.permission !== 'granted') { toast('❌ התראות לא מאושרות'); return; }
  const swReg = await navigator.serviceWorker.getRegistration('./firebase-messaging-sw.js');

      body: 'אם אתה רואה זאת — ההתראות עובדות!',

}

// ── Calendar view ──
function renderCalendar(isDk) {
  const firstDay    = new Date(S.year, S.month, 1);
  const daysInMonth = new Date(S.year, S.month+1, 0).getDate();
  const prevMonDays = new Date(S.year, S.month,   0).getDate();
  const startDow    = firstDay.getDay(); // 0=Sun

  // Build event map for visible range
  const gridStart = new Date(S.year, S.month, 1 - startDow);
  const total     = startDow + daysInMonth;
  const trailing  = total%7===0 ? 0 : 7-(total%7);
  const gridEnd   = new Date(S.year, S.month, daysInMonth + trailing);
  const evMap = {};
  for (const ev of S.events) {
    for (const occ of getOccurrences(ev, gridStart, gridEnd)) {
      (evMap[occ.occDate] = evMap[occ.occDate]||[]).push(occ);
    }
  }

  const todayStr = ds(_today);
  let h = `<div class="cal-view-wrap"><div class="cal-wrap">
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="nextMonth()">&#8250;</button>
    <div class="cal-title">${MONTHS_HE[S.month]} ${S.year}</div>
    <button class="cal-nav-btn" onclick="prevMonth()">&#8249;</button>
  </div>
  <div class="cal-grid">
    <div class="cal-days-header">
      ${DAYS_HE.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('')}
    </div>
    <div class="cal-cells">`;

  function cell(dayNum, dStr, isCur) {
    const evs    = evMap[dStr] || [];
    const isTod  = dStr === todayStr;
    const isSel  = dStr === S.selDate;
    const isSat  = pd(dStr).getDay() === 6;
    let cls = "cal-cell";
    if (!isCur) cls += " other-month";
    if (isTod)  cls += " is-today";
    if (isSel)  cls += " is-sel";
    if (isSat)  cls += " is-sat";

    const visible = evs.slice(0,2);
    const extra   = evs.length - visible.length;
    const bars = visible.map(ev =>
      `<div class="cal-bar" style="background:${ev.color||'#6366f1'};${(!isCur)?'opacity:.4;':''}"></div>`
    ).join('');

    return `<div class="${cls}" onclick="selDate('${dStr}')">
      <div class="day-num">${dayNum}</div>
      ${bars||extra?`<div class="cal-bars">
        ${bars}
        ${extra?`<div class="cal-bar-more">+${extra}</div>`:''}
      </div>`:''}
    </div>`;
  }

  // Prev month fill
  for (let i=0; i<startDow; i++) {
    const d = prevMonDays - startDow + 1 + i;
    const dStr = ds(new Date(S.year, S.month-1, d));
    h += cell(d, dStr, false);
  }
  // Current month
  for (let d=1; d<=daysInMonth; d++) {
    h += cell(d, ds(new Date(S.year, S.month, d)), true);
  }
  // Next month fill
  for (let d=1; d<=trailing; d++) {
    h += cell(d, ds(new Date(S.year, S.month+1, d)), false);
  }

  h += `</div></div></div>`; // close cal-cells, cal-grid, cal-wrap

  // ── Day panel ──
  const dayEvs  = eventsForDate(S.selDate);
  const selD    = pd(S.selDate);
  const isToday = S.selDate === ds(_today);
  const dayLbl  = isToday ? "היום" : `${selD.getDate()} ב${MONTHS_HE[selD.getMonth()]}`;

  h += `<div class="day-panel">
    <div class="day-panel-hd">
      <span>📆 ${dayLbl}</span>
      <button class="add-day-btn" onclick="openForm('${S.selDate}')">+ הוסף</button>
    </div>`;

  if (!dayEvs.length) {
    h += `<div style="text-align:center;padding:14px;color:#94a3b8;font-size:13px;">אין אירועים ביום זה</div>`;
  } else {
    h += dayEvs.map(ev => evCard(ev, isDk)).join('');
  }
  h += `</div></div>`; // close day-panel + cal-view-wrap
  return h;
}

// ── All events view ──
function renderAll(isDk) {
  const q = S.searchQ.trim().toLowerCase();
  let all = [...S.events].sort((a,b)=>a.date.localeCompare(b.date));
  if (q) all = all.filter(ev => (ev.title||'').toLowerCase().includes(q) || (ev.note||'').toLowerCase().includes(q));
  if (!all.length) return `<div class="section"><div class="empty"><div class="empty-ic">📋</div><div class="empty-tx">${q?'לא נמצאו תוצאות':'אין אירועים עדיין'}</div></div></div>`;
  return `<div class="section">${all.map(ev=>evCard(ev,isDk)).join('')}</div>`;
}

// ── Event card (shared) ──
function evCard(ev, isDk) {
  const color  = ev.color || '#6366f1';
  const bg     = isDk ? '#263349' : 'white';
  const chips  = (ev.members||[]).map(m => memberChip(m, isDk)).join('');
  const rep    = repeatLabel(ev);
  const adv    = advLabel(ev);
  // Avatar = first member's color+initial
  const firstM = (ev.members||[])[0] || S.me;
  const cl     = mc(firstM);
  const photoM = MEMBER_PHOTOS[firstM];
  const avatarContentM = photoM
    ? `<img src="${photoM}" alt="${esc(firstM)}" style="width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%;">`
    : firstM.charAt(0);
  return `<div class="ev-card" style="background:${bg};" onclick="openEdit('${ev._k}')">
    <div class="ev-color-bar" style="background:${color};"></div>
    <div class="ev-avatar" style="background:${isDk?cl.darkBg:cl.bg};color:${isDk?cl.darkText:cl.text};overflow:hidden;">${avatarContentM}</div>
    <div class="ev-body">
      <div class="ev-title" style="color:${isDk?'#e2e8f0':'#1e293b'};">${esc(ev.title)}</div>
      <div class="ev-meta">
        <span>${fmtTime(ev)}</span>
        ${rep?`<span style="color:${color};font-weight:600;">🔄 ${rep}</span>`:''}
        ${adv?`<span>${adv}</span>`:''}
      </div>
      <div class="chips">${chips}</div>
      ${ev.note?`<div style="font-size:11px;color:#64748b;font-style:italic;margin-top:3px;">💬 ${esc(ev.note)}</div>`:''}
    </div>
    <button class="del-btn" onclick="event.stopPropagation();deleteEvent('${ev._k}')">✕</button>
  </div>`;
}

function advLabel(ev) {
  if (ev.allDay) return '';
  const arr = Array.isArray(ev.advanceMins) ? ev.advanceMins : [ev.advanceMins ?? 30];
  if (!arr.length) return '';
  const parts = arr.map(v => v === 0 ? 'בזמן' : v >= 60 ? (v/60)+"שע׳" : v+"ד׳");
  return `🔔 ${parts.join(' + ')} לפני`;
}
function memberChip(m, isDk) {
  const cl = mc(m);
  return `<span class="chip" style="background:${isDk?cl.darkBg:cl.bg};color:${isDk?cl.darkText:cl.text};">${esc(m)}</span>`;
}

// ── Form (bottom sheet) ──
function renderForm(isDk) {
  const iBg = isDk?'#0f172a':'white';
  const iBd = isDk?'#334155':'#e2e8f0';
  const iC  = isDk?'#e2e8f0':'#1e293b';

  return `
  <div class="overlay" onclick="closeForm()"></div>
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="form-title">${S.editKey?'✏️ עריכה':'➕ חדש'}</div>

    <!-- סוג -->
    <div class="fg">
      <div style="display:flex;gap:8px;margin-bottom:2px;">
        <button onclick="setEventType('reminder')" style="flex:1;padding:10px;border-radius:11px;font-size:14px;font-weight:600;font-family:inherit;
          ${F.eventType==='reminder'?'background:#6366f1;color:white;':'background:'+iBg+';color:'+iC+';border:1.5px solid '+iBd+';'}">
          🔔 תזכורת
        </button>
        <button onclick="setEventType('event')" style="flex:1;padding:10px;border-radius:11px;font-size:14px;font-weight:600;font-family:inherit;
          ${F.eventType==='event'?'background:#6366f1;color:white;':'background:'+iBg+';color:'+iC+';border:1.5px solid '+iBd+';'}">
          📅 אירוע
        </button>
      </div>
    </div>

    <div class="fg">
      <label class="flbl">כותרת *</label>
      <input class="finput" id="ft" value="${esc(F.title)}" oninput="F.title=this.value"
        placeholder="${F.eventType==='event'?'שם האירוע, למשל: טיול פסח...':'שם התזכורת...'}"
        style="background:${iBg};border-color:${iBd};color:${iC};">
    </div>

    ${F.eventType==='event'?`
    <!-- אירוע: תאריך התחלה + סיום -->
    <div class="frow">
      <div class="fg">
        <label class="flbl">מתאריך</label>
        <input type="date" class="finput" value="${F.date}" oninput="F.date=this.value"
          style="background:${iBg};border-color:${iBd};color:${iC};">
      </div>
      <div class="fg">
        <label class="flbl">עד תאריך</label>
        <input type="date" class="finput" value="${F.endDate}" oninput="F.endDate=this.value"
          min="${F.date}" style="background:${iBg};border-color:${iBd};color:${iC};">
      </div>
    </div>`:`
    <!-- תזכורת: תאריך + שעה -->
    <div class="frow">
      <div class="fg">
        <label class="flbl">תאריך</label>
        <input type="date" class="finput" value="${F.date}" oninput="F.date=this.value"
          style="background:${iBg};border-color:${iBd};color:${iC};">
      </div>
      <div class="fg">
        <label class="flbl">שעה</label>
        <input type="time" class="finput" value="${F.time}" oninput="F.time=this.value"
          ${F.allDay?'disabled':''} style="background:${iBg};border-color:${iBd};color:${iC};${F.allDay?'opacity:.35;':''}">
      </div>
    </div>

    <div class="fg">
      <label class="check-row">
        <input type="checkbox" ${F.allDay?'checked':''} onchange="toggleAllDay()">
        כל היום
      </label>
    </div>

    <div class="fg">
      <label class="flbl">חזרה</label>
      <select class="fsel" onchange="setRepeat(this.value)" style="background:${iBg};border-color:${iBd};color:${iC};">
        ${REPEATS.filter(o=>o.v!=='range').map(o=>`<option value="${o.v}" ${F.repeat===o.v?'selected':''}>${o.l}</option>`).join('')}
      </select>
    </div>

    ${F.repeat==='custom'?`
    <div class="fg">
      <label class="flbl">כל כמה ימים?</label>
      <input type="number" class="finput" value="${F.customDays}" min="1" max="365"
        oninput="F.customDays=this.value" style="background:${iBg};border-color:${iBd};color:${iC};">
    </div>`:''}

    ${F.repeat!=='none'?`
    <div class="fg">
      <label class="flbl">עד תאריך (אופציונלי)</label>
      <input type="date" class="finput" value="${F.endDate}" oninput="F.endDate=this.value"
        min="${F.date}" style="background:${iBg};border-color:${iBd};color:${iC};">
    </div>`:''}
    `}

    <div class="fg">
      <label class="flbl">בני משפחה</label>
      <div class="mems-grid">
        ${MEMBERS.map((m,i)=>{
          const cl=MC[i]; const sel=F.members.includes(m);
          return `<button class="mem-check" onclick="toggleMem('${esc(m)}')" style="${sel
            ?`background:${isDk?cl.darkBg:cl.border};color:white;border:none;`
            :`background:${isDk?'#0f172a':'white'};color:${isDk?'#94a3b8':'#64748b'};border-color:${iBd};`}">${esc(m)}</button>`;
        }).join('')}
      </div>
    </div>

    ${F.eventType==='reminder' && !F.allDay?`
    <div class="fg">
      <label class="flbl">תזכורות (ניתן לבחור מספר)</label>
      <div class="mems-grid">
        ${ADVANCE.map(o=>{
          const sel = F.advanceMins.includes(o.v);
          return `<button class="mem-check" onclick="toggleAdv(${o.v})" style="${sel
            ?`background:#6366f1;color:white;border:none;`
            :`background:${isDk?'#0f172a':'white'};color:${isDk?'#94a3b8':'#64748b'};border-color:${iBd};`}">${o.l}</button>`;
        }).join('')}
      </div>
    </div>`:''}


    <div class="fg">
      <label class="flbl">צבע</label>
      <div class="color-row">
        ${COLORS.map(c=>`<div class="cswatch ${F.color===c?'sel':''}" style="background:${c};" onclick="setColor('${c}')"></div>`).join('')}
      </div>
    </div>

    <div class="fg">
      <label class="flbl">הערה (אופציונלי)</label>
      <textarea class="finput" rows="2" oninput="F.note=this.value"
        placeholder="פרטים נוספים..." style="resize:none;background:${iBg};border-color:${iBd};color:${iC};">${esc(F.note)}</textarea>
    </div>

    <div class="form-btns">
      <button class="btn-cancel" onclick="closeForm()">ביטול</button>
      <button class="btn-save" onclick="saveEvent()">${S.editKey?'💾 שמור שינויים':'✅ הוסף אירוע'}</button>
    </div>

    ${S.editKey?`<button class="btn-del" onclick="if(confirm('למחוק את האירוע?'))deleteEvent('${S.editKey}')">🗑 מחק אירוע</button>`:''}
  </div>`;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
// Restore dark mode
if (localStorage.getItem("fcal-dark")==="1") {
  document.body.classList.add("dark");
  document.querySelector('meta[name="theme-color"]').content="#0f172a";
}

// Init FCM (store promise so registerFCMToken can await it)
fcmReady = initFCM();

// Ask permission on first tap → register FCM token
document.addEventListener('click', async function once() {
  document.removeEventListener('click', once);
  const granted = await askNotifPermission();
  if (granted && S.me) registerFCMToken(S.me);
}, {once:true});

startListeners();
render();
</script>
</body>
</html>
