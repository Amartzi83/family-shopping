<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e293b">
<title>משפחה שלנו</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Rubik',sans-serif;
  max-width:520px;margin:0 auto;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  background:#111;
  min-height:100vh;
}
button{cursor:pointer;border:none;background:none;font-family:inherit}

@keyframes fadeIn {from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.4}}

/* ── Background photo — fixed, full screen ── */
.bg-photo{
  position:fixed;
  top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  height:100%;
  z-index:0;
  overflow:hidden;
}
.bg-photo img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
}
/* Dark tint over photo */
.bg-tint{
  position:fixed;
  top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  height:100%;
  background:rgba(0,0,0,.38);
  z-index:1;
}

/* ── Scrollable page layer ── */
.page{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:54px 16px 36px;
  gap:14px;
}

/* ── Glass mixin helper ── */
/* all glass elements: rgba white 25% bg + blur + border */

/* ── Title glass block ── */
.glass-header{
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.35);
  border-radius:22px;
  padding:18px 20px;
  animation:slideUp .4s ease both;
  box-shadow:0 4px 24px rgba(0,0,0,.15);
}
.header-title{
  font-size:26px;font-weight:800;color:white;
  text-shadow:0 1px 8px rgba(0,0,0,.3);
  letter-spacing:-.5px;margin-bottom:2px;
}
.header-sub{font-size:12px;color:rgba(255,255,255,.8);font-weight:400;margin-bottom:10px}
.date-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:5px 14px;
  font-size:12px;font-weight:600;color:white;
}

/* ── App cards ── */
.glass-card{
  border-radius:22px;
  padding:20px 18px;
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.35);
  display:flex;align-items:center;gap:14px;
  cursor:pointer;
  transition:transform .15s,background .2s;
  position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.15);
  animation:slideUp .4s ease both;
}
.glass-card:nth-child(1){animation-delay:.08s}
.glass-card:nth-child(2){animation-delay:.16s}
.glass-card:active{transform:scale(.97);background:rgba(255,255,255,.32)}
.glass-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);
  pointer-events:none;border-radius:22px;
}
.gc-icon{font-size:42px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}
.gc-info{flex:1;min-width:0}
.gc-title{font-size:18px;font-weight:700;color:white;margin-bottom:3px;text-shadow:0 1px 4px rgba(0,0,0,.25)}
.gc-desc{font-size:12px;color:rgba(255,255,255,.75);line-height:1.4}
.gc-badge{
  background:rgba(255,255,255,.28);border-radius:12px;
  padding:3px 10px;font-size:11px;font-weight:700;color:white;
  flex-shrink:0;white-space:nowrap;
  border:1px solid rgba(255,255,255,.3);
}
.gc-arrow{font-size:20px;color:rgba(255,255,255,.5);flex-shrink:0}

/* ── Today events glass panel ── */
.today-panel{
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.35);
  border-radius:22px;
  padding:18px 16px;
  animation:slideUp .4s ease .22s both;
  box-shadow:0 4px 24px rgba(0,0,0,.15);
}
.today-hd{
  font-size:13px;font-weight:700;
  color:white;
  margin-bottom:12px;
}
.today-ev{
  border-radius:13px;padding:11px 13px;margin-bottom:7px;
  background:rgba(255,255,255,.18);
  border-right:4px solid #6366f1;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all .15s;
  border-top:1px solid rgba(255,255,255,.12);
}
.today-ev:last-child{margin-bottom:0}
.today-ev:active{transform:scale(.98);background:rgba(255,255,255,.28)}
.ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ev-name{font-size:14px;font-weight:600;color:white;flex:1}
.ev-time{font-size:11px;color:rgba(255,255,255,.7);font-weight:500}
.no-events{text-align:center;color:rgba(255,255,255,.6);font-size:13px;padding:6px 0}

/* Loading */
.ldot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.6);display:inline-block;animation:pulse 1.2s ease infinite}
.ldot:nth-child(2){animation-delay:.2s}
.ldot:nth-child(3){animation-delay:.4s}
.loading-wrap{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;gap:8px;z-index:10}
</style>
</head>
<body>

<!-- Background photo (fixed) -->
<div class="bg-photo">
  <img src="img/family.jpg" alt="המשפחה שלנו">
</div>
<div class="bg-tint"></div>

<div id="root">
  <div class="loading-wrap">
    <div class="ldot"></div><div class="ldot"></div><div class="ldot"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGP5nqOB39ENoeRIMpFo_B3Ya2RBE99sg",
  authDomain: "family-shopping-9f8a6.firebaseapp.com",
  databaseURL: "https://family-shopping-9f8a6-default-rtdb.firebaseio.com",
  projectId: "family-shopping-9f8a6",
  storageBucket: "family-shopping-9f8a6.firebasestorage.app",
  messagingSenderId: "7886163686",
  appId: "1:7886163686:web:544391dd14dac18b2ab527"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MONTHS_HE = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const DAYS_HE   = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

function ds(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function pd(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
const esc = s => s?String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):"";

let todayEvents  = [];
let shoppingCount = 0;

function getOccurrences(ev, dateStr) {
  const base   = pd(ev.date);
  const target = pd(dateStr);
  if (ev.endDate && pd(ev.endDate) < target) return false;
  if (!ev.repeat || ev.repeat==='none') return base.getTime()===target.getTime();
  if (ev.repeat==='range') return base<=target && pd(ev.endDate||ev.date)>=target;
  if (base > target) return false;
  const diff = Math.round((target-base)/86400000);
  if (ev.repeat==='daily')   return true;
  if (ev.repeat==='weekly')  return diff%7===0;
  if (ev.repeat==='monthly') return base.getDate()===target.getDate();
  if (ev.repeat==='custom')  return diff%(ev.customDays||7)===0;
  return false;
}

function loadData() {
  const todayStr = ds(new Date());
  db.ref("calendar/events").once("value", snap => {
    const d = snap.val()||{};
    todayEvents = Object.values(d).filter(ev=>getOccurrences(ev,todayStr))
      .sort((a,b)=>{ if(a.allDay!==b.allDay)return a.allDay?-1:1; return (a.time||'').localeCompare(b.time||''); });
    render();
  });
  db.ref("lists/short").once("value", snap => {
    shoppingCount = Object.keys(snap.val()||{}).length;
    render();
  });
}

function render() {
  const now = new Date();
  const dateLabel = `יום ${DAYS_HE[now.getDay()]}  •  ${now.getDate()} ב${MONTHS_HE[now.getMonth()]} ${now.getFullYear()}`;

  const evCards = todayEvents.length
    ? todayEvents.map(ev=>`
        <div class="today-ev" onclick="location.href='calendar.html'" style="border-right-color:${ev.color||'#6366f1'}">
          <div class="ev-dot" style="background:${ev.color||'#6366f1'}"></div>
          <div class="ev-name">${esc(ev.title)}</div>
          <div class="ev-time">${ev.allDay?'כל היום':ev.time||''}</div>
        </div>`).join('')
    : `<div class="no-events">אין אירועים היום 🎉</div>`;

  document.getElementById("root").innerHTML = `
    <div class="page">

      <!-- כותרת זכוכית -->
      <div class="glass-header">
        <div class="header-title">המשפחה שלנו 🏠</div>
        <div class="header-sub">הכל במקום אחד</div>
        <div class="date-pill">📅 ${dateLabel}</div>
      </div>

      <!-- כרטיסי ניווט -->
      <div class="glass-card" onclick="location.href='calendar.html'">
        <div class="gc-icon">📅</div>
        <div class="gc-info">
          <div class="gc-title">יומן משפחתי</div>
          <div class="gc-desc">אירועים, תזכורות ועוד — לכל בני המשפחה</div>
        </div>
        ${todayEvents.length>0?`<div class="gc-badge">${todayEvents.length} היום</div>`:''}
        <div class="gc-arrow">‹</div>
      </div>

      <div class="glass-card" onclick="location.href='shopping.html'">
        <div class="gc-icon">🛒</div>
        <div class="gc-info">
          <div class="gc-title">קניות משפחתיות</div>
          <div class="gc-desc">רשימות קניות, שוברים ותווים, היסטוריה</div>
        </div>
        ${shoppingCount>0?`<div class="gc-badge">${shoppingCount} פריטים</div>`:''}
        <div class="gc-arrow">‹</div>
      </div>

      <!-- אירועי היום -->
      <div class="today-panel">
        <div class="today-hd">📆 אירועים להיום</div>
        ${evCards}
      </div>

    </div>`;
}

render();
loadData();
</script>
</body>
</html>
