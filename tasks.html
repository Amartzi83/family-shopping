<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e293b">
<title>משימות משפחתיות</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Rubik',sans-serif;background:#eef2f7;min-height:100vh;max-width:520px;margin:0 auto;-webkit-font-smoothing:antialiased;transition:background .3s}
input:focus,textarea:focus,select:focus{outline:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;-webkit-appearance:none}

@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ── Loading ── */
#loading{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:12px}
#loading .icon{font-size:36px;animation:pulse 1.5s infinite}
#loading .text{font-size:13px;color:#94a3b8}

/* ── Header ── */
.header{background:white;padding:14px 18px 12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.header-title{font-size:18px;font-weight:700;color:#1e293b;text-align:center;flex:1}
.header-icon-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:#f1f5f9;flex-shrink:0;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
.header-icon-btn:active{background:#e2e8f0}

/* ── Members ── */
.members-row{display:flex;gap:16px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none}
.members-row::-webkit-scrollbar{display:none}
.member-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer}
.member-avatar{width:58px;height:58px;border-radius:50%;border:3px solid transparent;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;position:relative;transition:all .2s;overflow:hidden}
.member-avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%}
.member-me-badge{position:absolute;top:-2px;right:-2px;background:#2563eb;color:white;font-size:9px;font-weight:700;padding:2px 5px;border-radius:6px;line-height:1.2}
.member-name{font-size:11px;font-weight:500;color:#64748b;text-align:center}
.member-name.is-me{color:#2563eb;font-weight:700}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;vertical-align:middle;margin-left:5px}
.sync-dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e88}
.sync-dot.off{background:#ef4444}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;padding:11px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{border-radius:10px;padding:8px 6px;font-size:11px;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s;text-align:center;line-height:1.3;background:white;color:#64748b;flex:1;border:none;cursor:pointer;font-family:inherit}
.tab-btn.active{color:white}
.tab-icon{font-size:17px;margin-bottom:1px}
.tab-count{font-size:10px;font-weight:400;opacity:.75}

/* ── Filter chips ── */
.filter-row{display:flex;gap:6px;padding:9px 16px 0;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1.5px solid #e2e8f0;background:white;color:#64748b;font-family:'Rubik',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.filter-chip.active{background:#6366f1;color:white;border-color:#6366f1}

/* ── Task list ── */
.tasks-list{padding:8px 16px 100px}
.empty-state{text-align:center;padding:40px 20px;color:#cbd5e1}
.empty-icon{font-size:42px;margin-bottom:6px}
.empty-tx{font-size:13px}

/* ── Task item ── */
.task-item{display:flex;align-items:flex-start;gap:10px;background:white;border-radius:13px;padding:13px 14px;margin-bottom:8px;box-shadow:0 2px 10px rgba(0,0,0,.05);animation:slideIn .22s ease both;transition:all .2s;border-right:4px solid transparent;position:relative}
.task-item:active{transform:scale(.98)}
.task-item.removing{animation:slideOut .35s ease forwards}
.task-item.pri-high{border-right-color:#ef4444}
.task-item.pri-med{border-right-color:#f59e0b}
.task-item.pri-low{border-right-color:#22c55e}
.task-item.pri-none{border-right-color:#e2e8f0}

.check-wrap{flex-shrink:0;padding-top:1px}
.check-circle{width:23px;height:23px;border-radius:50%;border:2px solid #cbd5e1;background:white;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;flex-shrink:0}
.check-circle:hover{border-color:#22c55e}
.check-circle.doing{background:#f59e0b;border-color:#f59e0b;color:white;font-size:11px}
.check-circle.done{background:#22c55e;border-color:#22c55e;color:white;font-size:13px;font-weight:700}

.task-body{flex:1;min-width:0;cursor:pointer}
.task-title{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:4px;word-break:break-word}
.task-title.is-done{text-decoration:line-through;opacity:.4}
.task-desc{font-size:12px;color:#64748b;margin-bottom:5px;line-height:1.4}
.task-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:5px}
.meta-chip{font-size:10px;font-weight:600;border-radius:20px;padding:2px 8px}
.chip-high{background:#fee2e2;color:#dc2626}
.chip-med{background:#ffedd5;color:#c2410c}
.chip-low{background:#dcfce7;color:#15803d}
.chip-date{background:#eef2ff;color:#4f46e5}
.chip-overdue{background:#fee2e2;color:#dc2626}
.chip-cal{background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd}

.task-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.task-member{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8}
.member-dot{width:18px;height:18px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.member-dot img{width:100%;height:100%;object-fit:cover}
.move-btn{font-size:11px;padding:4px 10px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;font-family:'Rubik',sans-serif;font-weight:600;transition:all .15s}
.move-btn:active{background:#e2e8f0}

.del-btn{opacity:.35;color:#ef4444;font-size:18px;padding:2px 4px;transition:all .15s;border-radius:6px;flex-shrink:0;font-family:inherit;border:none;background:none;cursor:pointer;line-height:1}
.del-btn:active{opacity:1;background:#fef2f2}

/* ── FAB ── */
.fab-add{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6366f1,#818cf8);color:white;border:none;border-radius:16px;padding:14px 28px;font-family:'Rubik',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px #6366f166;display:flex;align-items:center;gap:8px;transition:transform .15s;z-index:100}
.fab-add:active{transform:translateX(-50%) scale(.96)}

/* ── Bottom sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;animation:fadeIn .2s}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:white;border-radius:20px 20px 0 0;padding:20px 18px 36px;z-index:501;animation:slideUp .28s ease;max-height:92vh;overflow-y:auto}
.handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px}
.form-title{font-size:17px;font-weight:700;color:#1e293b;margin-bottom:16px}
.fg{margin-bottom:13px}
.flbl{font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px;display:block}
.finput{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:'Rubik',sans-serif;color:#1e293b;transition:border-color .15s;background:white}
.finput:focus{border-color:#6366f1}
textarea.finput{resize:none;min-height:68px;line-height:1.5}

.pri-btns{display:flex;gap:6px}
.pri-btn{flex:1;padding:8px 4px;border-radius:10px;border:2px solid #e2e8f0;background:#f8fafc;font-family:'Rubik',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:#64748b;text-align:center}
.pri-btns .pri-btn.sel-high{background:#ef4444!important;border-color:#ef4444!important;color:white!important;box-shadow:0 3px 10px rgba(239,68,68,.4);transform:scale(1.04)}
.pri-btns .pri-btn.sel-med{background:#f59e0b!important;border-color:#f59e0b!important;color:white!important;box-shadow:0 3px 10px rgba(245,158,11,.4);transform:scale(1.04)}
.pri-btns .pri-btn.sel-low{background:#22c55e!important;border-color:#22c55e!important;color:white!important;box-shadow:0 3px 10px rgba(34,197,94,.4);transform:scale(1.04)}
.pri-btns .pri-btn.sel-none{background:#64748b!important;border-color:#64748b!important;color:white!important;box-shadow:0 3px 10px rgba(100,116,139,.3);transform:scale(1.04)}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;background:#f8fafc;border-radius:12px;border:1.5px solid #e2e8f0}
.toggle-info p{font-size:13px;font-weight:600;color:#1e293b}
.toggle-info span{font-size:11px;color:#64748b}
.toggle{width:44px;height:24px;border-radius:12px;background:#cbd5e1;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:#6366f1}
.toggle::after{content:'';position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:white;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.toggle.on::after{transform:translateX(-20px)}

.form-btns{display:flex;gap:8px;margin-top:18px}
.btn-cancel{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;background:#f1f5f9;color:#64748b;font-family:'Rubik',sans-serif}
.btn-save{flex:2;padding:12px;border-radius:12px;font-size:14px;font-weight:700;color:white;background:linear-gradient(135deg,#6366f1,#818cf8);box-shadow:0 3px 10px #6366f144;font-family:'Rubik',sans-serif}
.btn-save:active{transform:scale(.97)}
.btn-delete{width:100%;margin-top:10px;padding:11px;border-radius:11px;font-size:13px;font-weight:500;color:#ef4444;background:#fef2f2;font-family:'Rubik',sans-serif;cursor:pointer}

/* ── Toast ── */
.toast{position:fixed;top:22px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:9px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:2000;animation:popIn .3s ease;white-space:nowrap}

/* ══ Dark Mode ══ */
body.dark{background:#0f172a;color:#e2e8f0}
.dark .header{background:#1a2236;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.dark .header-title{color:#e2e8f0}
.dark .header-icon-btn{background:#263349;color:#94a3b8}
.dark .header-icon-btn:active{background:#334155}
.dark .member-name{color:#64748b}
.dark .member-name.is-me{color:#818cf8}
.dark .tab-btn{background:#1a2236;color:#94a3b8;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.dark .filter-chip{background:#1a2236;border-color:#334155;color:#94a3b8}
.dark .filter-chip.active{background:#4f46e5;border-color:#4f46e5;color:white}
.dark .task-item{background:#1a2236;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.dark .task-title{color:#e2e8f0}
.dark .task-desc{color:#94a3b8}
.dark .task-title.is-done{opacity:.3}
.dark .check-circle{background:#0f172a;border-color:#334155}
.dark .move-btn{background:#263349;border-color:#334155;color:#94a3b8}
.dark .task-member{color:#475569}
.dark .task-item.pri-none{border-right-color:#334155}
.dark .empty-state{color:#475569}
.dark .sheet{background:#1a2236}
.dark .form-title{color:#e2e8f0}
.dark .flbl{color:#94a3b8}
.dark .finput{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark .finput:focus{border-color:#6366f1}
.dark .finput::placeholder{color:#64748b}
.dark .pri-btn{background:#0f172a;border-color:#334155;color:#94a3b8}
.dark .toggle-row{background:#0f172a;border-color:#334155}
.dark .toggle-info p{color:#e2e8f0}
.dark .toggle-info span{color:#64748b}
.dark .toggle{background:#334155}
.dark .btn-cancel{background:#334155;color:#94a3b8}
.dark .btn-delete{background:#7f1d1d;color:#fca5a5}
.dark .handle{background:#334155}
.dark .toast{background:#334155;color:#e2e8f0}
</style>
</head>
<body>

<div id="app">
  <div id="loading"><div class="icon">✅</div><div class="text">מתחבר...</div></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGP5nqOB39ENoeRIMpFo_B3Ya2RBE99sg",
  authDomain: "family-shopping-9f8a6.firebaseapp.com",
  databaseURL: "https://family-shopping-9f8a6-default-rtdb.firebaseio.com",
  projectId: "family-shopping-9f8a6",
  storageBucket: "family-shopping-9f8a6.firebasestorage.app",
  messagingSenderId: "7886163686",
  appId: "1:7886163686:web:544391dd14dac18b2ab527"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Constants ──
const MEMBERS = ["אמא","אבא","גפן","שקד"];
const MEMBER_PHOTOS = {
  "אמא": "img/mama.jpg",
  "אבא": "img/abba.png",
  "גפן": "img/gafen.jpg",
  "שקד": "img/shaked.jpg",
};
const MC = [
  {bg:"#fbcfe8",border:"#ec4899",text:"#be185d",darkBg:"#831843",darkText:"#f9a8d4"},
  {bg:"#bfdbfe",border:"#3b82f6",text:"#1d4ed8",darkBg:"#1e3a8a",darkText:"#93c5fd"},
  {bg:"#a7f3d0",border:"#10b981",text:"#047857",darkBg:"#064e3b",darkText:"#6ee7b7"},
  {bg:"#fde68a",border:"#f59e0b",text:"#b45309",darkBg:"#78350f",darkText:"#fcd34d"},
];
const mc = n => MC[MEMBERS.indexOf(n)] || MC[0];

// ── State ──
let S = {
  me:      localStorage.getItem("tasks-me") || "",
  tab:     "todo",
  filter:  "all",
  tasks:   {},
  connected: false,
  loaded:  false,
  dark:    localStorage.getItem("tasks-dark") === "1",
  editId:  null,
  formPri: "none",
  formCal: false,
};

if (S.dark) document.body.classList.add("dark");

const esc = s => s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : "";
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate  = d => { if (!d) return ""; const [y,m,day]=d.split("-"); return `${day}/${m}`; };

// ── Firebase ──
function startListeners() {
  db.ref("tasks").on("value", snap => {
    S.tasks  = snap.val() || {};
    S.loaded = true;
    render();
  });
  db.ref(".info/connected").on("value", snap => {
    S.connected = snap.val() === true;
    render();
  });
}

// ── Data helpers ──
function getItems() {
  if (!S.me) return [];
  const mt = S.tasks[S.me] || {};
  let items = Object.entries(mt).map(([id,t])=>({...t,_id:id})).filter(t=>t.status===S.tab);
  if (S.filter==="cal")       items = items.filter(t=>t.calSync);
  else if (S.filter!=="all")  items = items.filter(t=>t.priority===S.filter);
  const po = {high:0,med:1,low:2,none:3};
  items.sort((a,b)=>{
    const pd=(po[a.priority]||3)-(po[b.priority]||3);
    if(pd!==0) return pd;
    if(a.dueDate&&b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if(a.dueDate) return -1;
    if(b.dueDate) return 1;
    return (b.createdAt||0)-(a.createdAt||0);
  });
  return items;
}

function cntTab(tab) {
  if (!S.me) return 0;
  return Object.values(S.tasks[S.me]||{}).filter(t=>t.status===tab).length;
}

// ── Render ──
function render() {
  if (!S.loaded) return;
  const el = document.getElementById("app");
  el.innerHTML = buildPage();
}

function buildPage() {
  const items    = getItems();
  const todoCnt  = cntTab("todo");
  const doingCnt = cntTab("doing");
  const doneCnt  = cntTab("done");

  // Tab active colors
  const tabActiveBg   = {todo:"#1e293b",   doing:"#b45309",  done:"#15803d"};
  const tabActiveDark = {todo:"#1e3a8a",   doing:"#78350f",  done:"#064e3b"};
  const tabActiveTx   = {todo:"#93c5fd",   doing:"#fcd34d",  done:"#6ee7b7"};
  const tabStyle = tab => {
    if (S.tab !== tab) return "";
    if (S.dark) return `style="background:${tabActiveDark[tab]};color:${tabActiveTx[tab]}"`;
    return `style="background:${tabActiveBg[tab]};color:white"`;
  };

  const membersHtml = MEMBERS.map(name => {
    const isMe = name === S.me;
    const c = mc(name);
    const border = isMe ? `border-color:${c.border}` : "border-color:transparent";
    return `
      <div class="member-avatar-wrap" onclick="selectMe('${name}')">
        <div class="member-avatar" style="${border}">
          <img src="${MEMBER_PHOTOS[name]}" alt="${esc(name)}"
               onerror="this.style.display='none';this.parentNode.insertAdjacentText('beforeend','${name[0]}')">
          ${isMe ? `<div class="member-me-badge">אני</div>` : ""}
        </div>
        <div class="member-name${isMe?" is-me":""}">${esc(name)}</div>
      </div>`;
  }).join("");

  const FILTERS = [
    {id:"all", label:"הכל"},
    {id:"high",label:"🔴 גבוהה"},
    {id:"med", label:"🟠 בינונית"},
    {id:"low", label:"🟢 נמוכה"},
    {id:"cal", label:"🔔 יומן"},
  ];
  const filtersHtml = FILTERS.map(f=>
    `<button class="filter-chip${S.filter===f.id?" active":""}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join("");

  let listHtml;
  if (!S.me) {
    listHtml = `<div class="empty-state"><div class="empty-icon">👆</div><p class="empty-tx">בחר מי אתה כדי לראות את המשימות שלך</p></div>`;
  } else if (!items.length) {
    const msgs  = {todo:"אין משימות ממתינות 🎉",doing:"אין משימות בתהליך",done:"עוד לא הושלמה משימה 💪"};
    const icons = {todo:"📋",doing:"⚡",done:"🏆"};
    listHtml = `<div class="empty-state"><div class="empty-icon">${icons[S.tab]}</div><p class="empty-tx">${msgs[S.tab]}</p></div>`;
  } else {
    listHtml = items.map(buildTaskHTML).join("");
  }

  return `
    <div class="header">
      <div class="header-top">
        <button class="header-icon-btn" onclick="location.href='home.html'">🏠</button>
        <div class="header-title">✅ משימות <span class="sync-dot ${S.connected?"on":"off"}"></span></div>
        <button class="header-icon-btn" onclick="toggleDark()">${S.dark?"☀️":"🌙"}</button>
      </div>
      <div class="members-row">${membersHtml}</div>
    </div>
    <div class="tabs">
      <button class="tab-btn" ${tabStyle("todo")} onclick="setTab('todo')">
        <div class="tab-icon">📋</div>לעשות
        ${todoCnt?`<div class="tab-count">${todoCnt}</div>`:""}
      </button>
      <button class="tab-btn" ${tabStyle("doing")} onclick="setTab('doing')">
        <div class="tab-icon">⚡</div>בתהליך
        ${doingCnt?`<div class="tab-count">${doingCnt}</div>`:""}
      </button>
      <button class="tab-btn" ${tabStyle("done")} onclick="setTab('done')">
        <div class="tab-icon">✅</div>הושלם
        ${doneCnt?`<div class="tab-count">${doneCnt}</div>`:""}
      </button>
    </div>
    <div class="filter-row">${filtersHtml}</div>
    <div class="tasks-list">${listHtml}</div>
    <button class="fab-add" onclick="openNew()">＋ משימה חדשה</button>`;
}

function buildTaskHTML(task) {
  const id     = task._id;
  const isDone = task.status === "done";
  const isDoing= task.status === "doing";
  const over   = task.dueDate && task.dueDate < todayStr() && !isDone;
  const checkCls = isDone?"done":isDoing?"doing":"";
  const checkIc  = isDone?"✓":isDoing?"⚡":"";

  const priLabel = {high:"🔴 גבוהה",med:"🟠 בינונית",low:"🟢 נמוכה"};
  const priChip  = {high:"chip-high",med:"chip-med",low:"chip-low"};
  let meta = "";
  if (task.priority && task.priority!=="none") meta += `<span class="meta-chip ${priChip[task.priority]}">${priLabel[task.priority]}</span>`;
  if (task.dueDate) meta += `<span class="meta-chip ${over?"chip-overdue":"chip-date"}">${over?"⚠️ ":"📅 "}${fmtDate(task.dueDate)}</span>`;
  if (task.calSync) meta += `<span class="meta-chip chip-cal">🔔 יומן</span>`;

  const c  = mc(S.me);
  const bg = S.dark ? c.darkBg : c.bg;
  const tx = S.dark ? c.darkText : c.text;
  const nextStatus = {todo:"doing",doing:"done",done:"todo"};
  const nextLabel  = {todo:"התחל ▶",doing:"סיים ✓",done:"↩ פתח"};

  return `
    <div class="task-item pri-${task.priority||"none"}" id="ti-${id}">
      <div class="check-wrap">
        <div class="check-circle ${checkCls}" onclick="cycleStatus('${id}','${task.status}')">${checkIc}</div>
      </div>
      <div class="task-body" onclick="openEdit('${id}')">
        <div class="task-title${isDone?" is-done":""}">${esc(task.title)}</div>
        ${task.desc?`<div class="task-desc">${esc(task.desc)}</div>`:""}
        ${meta?`<div class="task-meta">${meta}</div>`:""}
        <div class="task-footer">
          <div class="task-member">
            <div class="member-dot" style="background:${bg};color:${tx}">
              <img src="${MEMBER_PHOTOS[S.me]||""}" alt="" onerror="this.style.display='none'">
            </div>
            ${esc(S.me)}
          </div>
          <button class="move-btn" onclick="event.stopPropagation();moveTask('${id}','${nextStatus[task.status]}')">${nextLabel[task.status]}</button>
        </div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();deleteTask('${id}')">×</button>
    </div>`;
}

// ── Actions ──
function selectMe(name) {
  S.me = name;
  localStorage.setItem("tasks-me", name);
  render();
}

function setTab(tab) { S.tab = tab; render(); }
function setFilter(f) { S.filter = f; render(); }

function toggleDark() {
  S.dark = !S.dark;
  localStorage.setItem("tasks-dark", S.dark?"1":"0");
  document.body.classList.toggle("dark", S.dark);
  render();
}

function cycleStatus(id, current) {
  moveTask(id, {todo:"doing",doing:"done",done:"todo"}[current]);
}

function moveTask(id, newStatus) {
  db.ref(`tasks/${S.me}/${id}`).update({status:newStatus});
  toast({doing:"משימה בתהליך ⚡",done:"משימה הושלמה ✅",todo:"משימה נפתחה מחדש 🔄"}[newStatus]);
}

function deleteTask(id) {
  const el = document.getElementById("ti-"+id);
  if (el) el.classList.add("removing");
  setTimeout(() => db.ref(`tasks/${S.me}/${id}`).remove(), 320);
  toast("משימה נמחקה");
  closeSheet();
}

// ── Sheet ──
function openNew() {
  if (!S.me) { toast("בחר תחילה מי אתה"); return; }
  S.editId  = null;
  S.formPri = "none";
  S.formCal = false;
  showSheet("", "", "");
}

function openEdit(id) {
  const task = (S.tasks[S.me]||{})[id];
  if (!task) return;
  S.editId  = id;
  S.formPri = task.priority||"none";
  S.formCal = !!task.calSync;
  showSheet(task.title||"", task.desc||"", task.dueDate||"");
}

function showSheet(title, desc, dueDate) {
  const priL = {high:"🔴 גבוהה", med:"🟠 בינונית", low:"🟢 נמוכה", none:"⬜ ללא"};

  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `
    <div class="sheet">
      <div class="handle"></div>
      <div class="form-title">${S.editId ? "עריכת משימה" : "משימה חדשה"}</div>
      <div class="fg">
        <label class="flbl">כותרת *</label>
        <input class="finput" id="fTitle" placeholder="מה צריך לעשות?" maxlength="80" value="${esc(title)}">
      </div>
      <div class="fg">
        <label class="flbl">תיאור (אופציונלי)</label>
        <textarea class="finput" id="fDesc" placeholder="פרטים נוספים...">${esc(desc)}</textarea>
      </div>
      <div class="fg">
        <label class="flbl">עדיפות</label>
        <div class="pri-btns">
          <button class="pri-btn" data-pri="high">${priL.high}</button>
          <button class="pri-btn" data-pri="med">${priL.med}</button>
          <button class="pri-btn" data-pri="low">${priL.low}</button>
          <button class="pri-btn" data-pri="none">${priL.none}</button>
        </div>
      </div>
      <div class="fg">
        <label class="flbl">תאריך יעד (אופציונלי)</label>
        <input class="finput" type="date" id="fDate" value="${dueDate}">
      </div>
      <div class="fg">
        <div class="toggle-row">
          <div class="toggle-info">
            <p>🗓 הוסף תזכורת ביומן</p>
            <span>יופיע ביומן המשפחתי המשותף</span>
          </div>
          <div class="toggle" id="calToggle"></div>
        </div>
      </div>
      <div class="form-btns">
        <button class="btn-cancel">ביטול</button>
        <button class="btn-save">שמור</button>
      </div>
      ${S.editId ? `<button class="btn-delete">🗑 מחק משימה</button>` : ""}
    </div>`;

  document.body.appendChild(overlay);

  // Set initial priority visual state
  refreshPriBtns(overlay);

  // Set initial calendar toggle state
  if (S.formCal) overlay.querySelector("#calToggle").classList.add("on");

  // Priority buttons
  overlay.querySelectorAll(".pri-btn[data-pri]").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      S.formPri = btn.dataset.pri;
      refreshPriBtns(overlay);
    });
  });

  // Calendar toggle
  overlay.querySelector("#calToggle").addEventListener("click", e => {
    e.stopPropagation();
    S.formCal = !S.formCal;
    overlay.querySelector("#calToggle").classList.toggle("on", S.formCal);
  });

  // Cancel / Save / Delete
  overlay.querySelector(".btn-cancel").addEventListener("click", closeSheet);
  overlay.querySelector(".btn-save").addEventListener("click", saveTask);
  if (S.editId) {
    overlay.querySelector(".btn-delete").addEventListener("click", () => {
      deleteTask(S.editId);
    });
  }

  // Close on overlay background tap
  overlay.addEventListener("click", e => { if (e.target === overlay) closeSheet(); });

  setTimeout(() => { const f = overlay.querySelector("#fTitle"); if (f) f.focus(); }, 350);
}

function refreshPriBtns(overlay) {
  overlay.querySelectorAll(".pri-btn[data-pri]").forEach(btn => {
    const p = btn.dataset.pri;
    btn.className = "pri-btn" + (p === S.formPri ? ` sel-${p}` : "");
  });
}

function closeSheet() {
  const o = document.querySelector(".overlay");
  if (o) o.remove();
}

function setPri(p) {
  S.formPri = p;
  const overlay = document.querySelector(".overlay");
  if (overlay) refreshPriBtns(overlay);
}

function toggleCal() {
  S.formCal = !S.formCal;
  const el = document.querySelector("#calToggle");
  if (el) el.classList.toggle("on", S.formCal);
}

function saveTask() {
  const title   = (document.getElementById("fTitle").value||"").trim();
  const desc    = (document.getElementById("fDesc").value||"").trim();
  const dueDate = document.getElementById("fDate").value||null;
  if (!title) { toast("חסרה כותרת"); return; }

  const data = {
    title, desc,
    priority:  S.formPri,
    dueDate:   dueDate||null,
    calSync:   S.formCal,
    status:    S.editId ? ((S.tasks[S.me]||{})[S.editId]||{}).status||"todo" : "todo",
    updatedAt: Date.now(),
  };

  if (S.editId) {
    db.ref(`tasks/${S.me}/${S.editId}`).update(data);
    toast("משימה עודכנה ✓");
  } else {
    data.createdAt = Date.now();
    db.ref(`tasks/${S.me}`).push(data);
    toast("משימה נוספה ✅");
  }

  if (S.formCal && dueDate) {
    db.ref("calendar/events").push({
      title:`✅ ${title}`, date:dueDate, time:null, allDay:true,
      repeat:"none", customDays:null, endDate:null,
      members:[S.me], advanceMins:[60], color:"#6366f1",
      note:desc||"", addedBy:S.me, addedAt:Date.now(),
    });
  }
  closeSheet();
}

// ── Toast ──
function toast(msg) {
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2300);
}

// ── Init ──
startListeners();
</script>
</body>
</html>
